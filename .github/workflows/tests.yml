name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun tsc --noEmit
        name: Type check

      - run: bunx eslint src/ tests/ example/
        name: Lint

      - run: bunx prettier --check 'src/**/*.ts' 'tests/**/*.ts' 'example/**/*.ts'
        name: Check formatting

      - run: bun test
        name: Run tests
